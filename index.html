<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Resp Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  padding: 30px;
  background: radial-gradient(circle at top, #111, #050505);
  font-family: 'Inter', 'Segoe UI', Arial;
  color: white;
  text-align: center;
}

/* HEADER */
h1 {
  margin-bottom: 40px;
  letter-spacing: 3px;
  color: #e5e5e5;
  font-weight: 600;
}

/* PANEL */
.row {
  backdrop-filter: blur(14px);
  background: rgba(20,20,20,0.55);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 22px;
  border-radius: 18px;
  margin-bottom: 25px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.9);
}

/* INPUT */
input {
  background: rgba(0,0,0,0.7);
  border: 1px solid #2a2a2a;
  color: white;
  padding: 10px;
  width: 160px;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 15px;
  font-size: 14px;
  transition: 0.2s;
}

input:focus {
  outline: none;
  border-color: #666;
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

/* GRID */
.channels {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}

.channel-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* LABEL */
.label {
  font-size: 11px;
  color: #666;
  margin-bottom: 6px;
  letter-spacing: 1px;
}

/* BUTTON */
button {
  width: 100%;
  border: none;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.15s;
}

.main-btn {
  height: 70px;
  font-size: 22px; /* 🔥 bigger numbers */
  font-family: 'JetBrains Mono', monospace; /* 🔥 coder vibe */
  letter-spacing: 1px;
  background: #1a1a1a;
  color: white;
}

.main-btn:hover {
  transform: translateY(-2px);
}

.main-btn:active {
  transform: scale(0.96);
}

.reset-btn {
  margin-top: 6px;
  height: 28px;
  font-size: 10px;
  background: #400000;
  color: #aaa;
}

/* STATES */
.empty {
  background: #1a1a1a;
  color: #555;
}

.cooldown {
  background: linear-gradient(145deg, #5a0000, #8b0000);
}

/* 🔥 ALERT */
@keyframes pulse {
  0% { box-shadow: 0 0 6px #ff9900; }
  50% { box-shadow: 0 0 22px #ffcc00; }
  100% { box-shadow: 0 0 6px #ff9900; }
}

.alert {
  background: linear-gradient(45deg, #ffcc00, #ff6600);
  color: #111;
  animation: pulse 1s infinite;
}

/* 🟢 SOFT GREEN (bardziej premium) */
.ready {
  background: linear-gradient(145deg, #1f5f1f, #2faa2f);
  color: #eaffea; /* 🔥 czytelniejsze */
  box-shadow: 0 0 12px rgba(0,255,0,0.25);
}

/* subtle hover highlight */
.main-btn:hover.ready {
  box-shadow: 0 0 20px rgba(0,255,0,0.5);
}

</style>
</head>

<body>

<h1>RESP CONTROL</h1>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDeMPA1eEfGgPqm3eXWPGrZsdJQg5ZQgK0",
  authDomain: "timer2137.firebaseapp.com",
  databaseURL: "https://timer2137-default-rtdb.firebaseio.com/",
  projectId: "timer2137",
  storageBucket: "timer2137.firebasestorage.app",
  messagingSenderId: "507828793756",
  appId: "1:507828793756:web:e0165f33811a74da181859"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);

const sound = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");

const timers = {};
const finishedAt = {};

function format(sec) {
  let m = Math.floor(sec / 60);
  let s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

const app = document.getElementById("app");

for (let i = 0; i < 3; i++) {

  const row = document.createElement("div");
  row.className = "row";

  const input = document.createElement("input");
  input.placeholder = "czas (minuty)";
  input.type = "number";

  const channels = document.createElement("div");
  channels.className = "channels";

  for (let j = 0; j < 5; j++) {

    const id = `row${i}_ch${j}`;

    const box = document.createElement("div");
    box.className = "channel-box";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "CH " + (j+1);

    const btn = document.createElement("button");
    btn.className = "main-btn empty";
    btn.innerText = "EMPTY";

    const resetBtn = document.createElement("button");
    resetBtn.className = "reset-btn";
    resetBtn.innerText = "RESET";

    btn.onclick = () => {
      let minutes = parseFloat(input.value);
      if (!minutes) return;

      const end = Date.now() + minutes * 60 * 1000;

      timers[id] = end;
      delete finishedAt[id];

      set(ref(db, 'timers/' + id), { end });
    };

    resetBtn.onclick = () => {
      delete timers[id];
      delete finishedAt[id];
      set(ref(db, 'timers/' + id), null);
    };

    onValue(ref(db, 'timers/' + id), (snap) => {
      const data = snap.val();
      if (!data) {
        delete timers[id];
        delete finishedAt[id];
      } else {
        timers[id] = data.end;
      }
    });

    btn.dataset.id = id;

    box.appendChild(label);
    box.appendChild(btn);
    box.appendChild(resetBtn);
    channels.appendChild(box);
  }

  row.appendChild(input);
  row.appendChild(channels);
  app.appendChild(row);
}

setInterval(() => {

  document.querySelectorAll(".main-btn").forEach(btn => {

    const id = btn.dataset.id;
    const end = timers[id];

    if (!end) {
      btn.innerText = "EMPTY";
      btn.className = "main-btn empty";
      return;
    }

    const now = Date.now();
    const remaining = Math.floor((end - now) / 1000);

    if (remaining > 0) {

      if (remaining <= 180) {
        btn.className = "main-btn alert";
      } else {
        btn.className = "main-btn cooldown";
      }

      btn.innerText = format(remaining);
      return;
    }

    if (!finishedAt[id]) {
      finishedAt[id] = now;
      sound.currentTime = 0;
      sound.play();
    }

    const elapsed = Math.floor((now - finishedAt[id]) / 1000);

    btn.innerText = "+" + format(elapsed);
    btn.className = "main-btn ready";

  });

}, 200);

</script>

</body>
</html>
