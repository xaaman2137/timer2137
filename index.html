<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Resp Timer</title>

<style>
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial;
    text-align: center;
    padding: 30px;
  }

  h1 { margin-bottom: 40px; }

  .row {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 25px;
  }

  input {
    background: #000;
    border: 1px solid #333;
    color: white;
    padding: 10px;
    width: 150px;
    text-align: center;
    margin-bottom: 15px;
  }

  .channels {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  .channel-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .label {
    font-size: 12px;
    color: #888;
    margin-bottom: 5px;
  }

  button {
    width: 100%;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }

  .main-btn {
    height: 60px;
    font-size: 15px;
    background: #1a1a1a;
    color: white;
    transition: 0.15s;
  }

  .main-btn:active {
    transform: scale(0.95);
  }

  .reset-btn {
    margin-top: 5px;
    height: 30px;
    font-size: 11px;
    background: #550000;
    color: white;
  }

  .empty { background: #1a1a1a; color: #aaa; }
  .cooldown { background: #8b0000; }
  .ready { background: #0f7a0f; }

</style>
</head>

<body>

<h1>RESP TIMER ONLINE</h1>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDeMPA1eEfGgPqm3eXWPGrZsdJQg5ZQgK0",
  authDomain: "timer2137.firebaseapp.com",
  databaseURL: "https://timer2137-default-rtdb.firebaseio.com/",
  projectId: "timer2137",
  storageBucket: "timer2137.firebasestorage.app",
  messagingSenderId: "507828793756",
  appId: "1:507828793756:web:e0165f33811a74da181859"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);

const sound = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");

// 🔥 GLOBAL STATE
const timers = {}; // { id: endTime }

// 🔧 format
function format(sec) {
  let m = Math.floor(sec / 60);
  let s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

const app = document.getElementById("app");

for (let i = 0; i < 3; i++) {

  const row = document.createElement("div");
  row.className = "row";

  const input = document.createElement("input");
  input.placeholder = "czas (minuty)";
  input.type = "number";

  const channels = document.createElement("div");
  channels.className = "channels";

  for (let j = 0; j < 5; j++) {

    const id = `row${i}_ch${j}`;

    const box = document.createElement("div");
    box.className = "channel-box";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "CH " + (j+1);

    const btn = document.createElement("button");
    btn.className = "main-btn empty";
    btn.innerText = "EMPTY";

    const resetBtn = document.createElement("button");
    resetBtn.className = "reset-btn";
    resetBtn.innerText = "RESET";

    // 🔥 CLICK (instant local + firebase)
    btn.onclick = () => {
      let minutes = parseFloat(input.value);
      if (!minutes) return;

      const end = Date.now() + minutes * 60 * 1000;

      timers[id] = end; // 🔥 instant UI

      set(ref(db, 'timers/' + id), { end });
    };

    resetBtn.onclick = () => {
      delete timers[id];
      set(ref(db, 'timers/' + id), null);
    };

    // 🔥 SYNC
    onValue(ref(db, 'timers/' + id), (snap) => {
      const data = snap.val();

      if (!data) {
        delete timers[id];
      } else {
        timers[id] = data.end;
      }
    });

    box.appendChild(label);
    box.appendChild(btn);
    box.appendChild(resetBtn);
    channels.appendChild(box);

    // przypisz do elementu
    btn.dataset.id = id;
  }

  row.appendChild(input);
  row.appendChild(channels);
  app.appendChild(row);
}

// 🔥 GLOBAL RENDER LOOP (smooth)
setInterval(() => {

  document.querySelectorAll(".main-btn").forEach(btn => {

    const id = btn.dataset.id;
    const end = timers[id];

    if (!end) {
      btn.innerText = "EMPTY";
      btn.className = "main-btn empty";
      return;
    }

    const remaining = Math.floor((end - Date.now()) / 1000);

    if (remaining <= 0) {
      btn.innerText = "STOI";
      btn.className = "main-btn ready";
    } else {
      btn.innerText = format(remaining);
      btn.className = "main-btn cooldown";
    }

  });

}, 200); // 🔥 szybciej niż 1s = smooth

</script>

</body>
</html>
