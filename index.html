<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Resp Timer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 30px;
  background: radial-gradient(circle at top, #0f1115, #050507);
  font-family: 'Inter', Arial;
  color: white;
  text-align: center;
}

h1 {
  margin-bottom: 20px;
  letter-spacing: 2px;
  color: #f0f0f0;
  font-weight: 600;
  font-size: 20px;
  font-family: 'JetBrains Mono', monospace;
}

#toggleRow {
  margin-bottom: 20px;
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: #aaa;
  cursor: pointer;
}

/* PANEL */
.row {
  position: relative;
  background: linear-gradient(145deg, rgba(25,25,25,0.7), rgba(10,10,10,0.7));
  border: 1px solid rgba(255,255,255,0.05);
  padding: 22px;
  border-radius: 20px;
  margin-bottom: 25px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.9),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

/* INPUT */
input {
  background: rgba(0,0,0,0.8);
  border: 1px solid #2a2a2a;
  color: white;
  padding: 10px;
  width: 160px;
  text-align: center;
  border-radius: 8px;
  margin-bottom: 15px;
}

/* GRID */
.channels {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}

.channel-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* LABEL */
.label {
  font-size: 11px;
  font-weight: 600;
  color: #bbb;
  margin-bottom: 6px;
  padding: 4px 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
}

/* BUTTON */
button {
  width: 100%;
  border: none;
  border-radius: 16px;
  font-weight: 600;
  cursor: pointer;
}

.main-btn {
  height: 72px;
  font-size: 26px;
  font-family: 'JetBrains Mono', monospace;
  background: #1a1a1a;
  color: white;
}

.reset-btn {
  margin-top: 6px;
  height: 28px;
  font-size: 10px;
  background: #3a0000;
  color: #aaa;
}

/* STATES */
.empty { background:#1a1a1a;color:#555; }
.cooldown { background:linear-gradient(145deg,#4a0000,#8b0000); }

.alert {
  background: linear-gradient(45deg,#ffcc00,#ff6600);
  color:#111;
}

.ready {
  background: linear-gradient(145deg,#1e5a1e,#3bd43b);
}

.up {
  background: linear-gradient(145deg,#0044cc,#3399ff);
}

/* WAVE ITEMS */
.wave-item {
  padding: 4px 8px;
  border-radius: 8px;
  margin: 0 4px;
  font-family: 'JetBrains Mono';
  font-size: 13px;
}

.wave-item.cooldown { background:#8b0000; }
.wave-item.alert { background:#ff9900;color:black; }
.wave-item.ready { background:#2faa2f; }
.wave-item.up { background:#3399ff; }

</style>
</head>

<body>

<h1 id="topbar">LOADING...</h1>
<button id="toggleRow">TOGGLE LAST ROW</button>

<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "timer2137.firebaseapp.com",
  databaseURL: "https://timer2137-default-rtdb.firebaseio.com/",
  projectId: "timer2137",
};

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);

const sound = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");

const timers = {};
const finishedAt = {};

function format(sec){
  let m=Math.floor(sec/60);
  let s=sec%60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function getStateClass(r){
  if(r<=0) return "ready";
  if(r<=180) return "alert";
  return "cooldown";
}

function updateTopBar(){

  const entries=Object.entries(timers)
  .map(([id,end])=>({
    id,
    remaining:Math.floor((end-Date.now())/1000)
  }))
  .filter(e=>e.remaining>0)
  .sort((a,b)=>a.remaining-b.remaining);

  const top=document.getElementById("topbar");

  if(entries.length===0){
    top.innerText="NO ACTIVE TIMERS";
    return;
  }

  const next=entries[0];
  const wave=entries.filter(e=>Math.abs(e.remaining-next.remaining)<=30);

  const allLong=entries.every(e=>e.remaining>300);

  if(allLong){
    top.innerText=`PRZERWA ${Math.floor(next.remaining/60)}min • dobra robota wojowniku`;
    return;
  }

  if(wave.length>1){
    top.innerHTML="WAVE: "+wave.map(e=>{
      const ch=e.id.split("_ch")[1];
      return `<span class="wave-item ${getStateClass(e.remaining)}">CH${ch} ${format(e.remaining)}</span>`;
    }).join("");
    return;
  }

  top.innerText=`NEXT: CH${next.id.split("_ch")[1]} • ${format(next.remaining)}`;
}

const app=document.getElementById("app");

for(let i=0;i<3;i++){

  const row=document.createElement("div");
  row.className="row";

  const input=document.createElement("input");
  input.placeholder="czas (minuty)";

  const channels=document.createElement("div");
  channels.className="channels";

  for(let j=0;j<5;j++){

    const id=`row${i}_ch${j}`;

    const box=document.createElement("div");
    box.className="channel-box";

    const label=document.createElement("div");
    label.className="label";
    label.innerText="CH "+(j+1);

    const btn=document.createElement("button");
    btn.className="main-btn empty";
    btn.innerText="EMPTY";

    const reset=document.createElement("button");
    reset.className="reset-btn";
    reset.innerText="RESET";

    btn.onclick=()=>{
      let m=parseFloat(input.value);
      if(!m)return;
      const end=Date.now()+m*60000;
      timers[id]=end;
      delete finishedAt[id];
      set(ref(db,'timers/'+id),{end});
    };

    reset.onclick=()=>{
      delete timers[id];
      delete finishedAt[id];
      set(ref(db,'timers/'+id),null);
    };

    onValue(ref(db,'timers/'+id),(snap)=>{
      const d=snap.val();
      if(!d){
        delete timers[id];
        delete finishedAt[id];
      } else timers[id]=d.end;
    });

    btn.dataset.id=id;

    box.append(label,btn,reset);
    channels.appendChild(box);
  }

  row.append(input,channels);
  app.appendChild(row);
}

/* toggle last row */
let visible=true;
document.getElementById("toggleRow").onclick=()=>{
  const rows=document.querySelectorAll(".row");
  const last=rows[rows.length-1];
  visible=!visible;
  last.style.display=visible?"block":"none";
};

setInterval(()=>{

  document.querySelectorAll(".main-btn").forEach(btn=>{

    const id=btn.dataset.id;
    const end=timers[id];

    if(!end){
      btn.innerText="EMPTY";
      btn.className="main-btn empty";
      return;
    }

    const now=Date.now();
    const r=Math.floor((end-now)/1000);

    if(r>0){
      btn.className="main-btn "+getStateClass(r);
      btn.innerText=format(r);
      return;
    }

    if(!finishedAt[id]){
      finishedAt[id]=now;
      sound.play();
    }

    const elapsed=Math.floor((now-finishedAt[id])/1000);

    if(elapsed>=300){
      btn.innerText="UP";
      btn.className="main-btn up";
    } else {
      btn.innerText="+"+format(elapsed);
      btn.className="main-btn ready";
    }

  });

  updateTopBar();

},200);

</script>

</body>
</html>
