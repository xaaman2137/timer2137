<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Resp Timer</title>

<style>
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', Arial;
    text-align: center;
    margin: 0;
    padding: 30px;
  }

  h1 {
    margin-bottom: 40px;
    letter-spacing: 2px;
  }

  .container {
    max-width: 900px;
    margin: auto;
  }

  .row {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 25px;
    box-shadow: 0 0 15px rgba(0,0,0,0.6);
  }

  input {
    background: #000;
    border: 1px solid #333;
    color: white;
    padding: 10px;
    width: 160px;
    text-align: center;
    margin-bottom: 15px;
    border-radius: 6px;
    font-size: 14px;
  }

  .channels {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  .channel-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .label {
    font-size: 12px;
    margin-bottom: 5px;
    color: #888;
  }

  button {
    width: 100%;
    height: 60px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    background: #1a1a1a;
    color: white;
    transition: 0.2s;
    font-size: 15px;
  }

  button:hover {
    transform: scale(1.05);
  }

  .empty {
    background: #1a1a1a;
    color: #aaa;
  }

  .cooldown {
    background: #8b0000;
  }

  .ready {
    background: #0f7a0f;
  }

</style>
</head>

<body>

<h1>RESP TIMER</h1>

<div class="container" id="app"></div>

<script>
const rows = 3;
const channelsPerRow = 5;

const app = document.getElementById("app");

const sound = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");

function formatTime(sec) {
  let m = Math.floor(sec / 60);
  let s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

for (let i = 0; i < rows; i++) {

  const rowDiv = document.createElement("div");
  rowDiv.className = "row";

  const input = document.createElement("input");
  input.placeholder = "czas (minuty)";
  input.type = "number";

  const channelsDiv = document.createElement("div");
  channelsDiv.className = "channels";

  for (let j = 0; j < channelsPerRow; j++) {

    const box = document.createElement("div");
    box.className = "channel-box";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "CH " + (j+1);

    const btn = document.createElement("button");
    btn.innerText = "EMPTY";
    btn.className = "empty";

    let interval = null;

    btn.onclick = () => {
      let minutes = parseFloat(input.value);
      if (!minutes) return;

      if (interval) clearInterval(interval);

      let remaining = Math.floor(minutes * 60);

      btn.className = "cooldown";
      btn.innerText = formatTime(remaining);

      interval = setInterval(() => {
        remaining--;

        btn.innerText = formatTime(remaining);

        if (remaining <= 0) {
          clearInterval(interval);
          interval = null;

          btn.innerText = "STOI";
          btn.className = "ready";

          sound.currentTime = 0;
          sound.play();
        }
      }, 1000);
    };

    box.appendChild(label);
    box.appendChild(btn);
    channelsDiv.appendChild(box);
  }

  rowDiv.appendChild(input);
  rowDiv.appendChild(channelsDiv);
  app.appendChild(rowDiv);
}
</script>

</body>
</html>

</body>
</html>
