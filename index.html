<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Resp Timer</title>

<style>
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial;
    text-align: center;
    padding: 30px;
  }

  .row {
    background: #111;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 25px;
  }

  input {
    background: #000;
    border: 1px solid #333;
    color: white;
    padding: 10px;
    width: 150px;
    text-align: center;
    margin-bottom: 15px;
  }

  .channels {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  .channel-box {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .label {
    font-size: 12px;
    color: #888;
    margin-bottom: 5px;
  }

  button {
    height: 60px;
    width: 100%;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    background: #1a1a1a;
    color: white;
  }

  .empty { background: #1a1a1a; color: #aaa; }
  .cooldown { background: #8b0000; }
  .ready { background: #0f7a0f; }

</style>
</head>

<body>

<h1>RESP TIMER ONLINE</h1>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDeMPA1eEfGgPqm3eXWPGrZsdJQg5ZQgK0",
  authDomain: "timer2137.firebaseapp.com",
  projectId: "timer2137",
  storageBucket: "timer2137.firebasestorage.app",
  messagingSenderId: "507828793756",
  appId: "1:507828793756:web:e0165f33811a74da181859"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);

const sound = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");

function formatTime(sec) {
  if (sec <= 0) return "STOI";
  let m = Math.floor(sec / 60);
  let s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

const app = document.getElementById("app");

for (let i = 0; i < 3; i++) {

  const row = document.createElement("div");
  row.className = "row";

  const input = document.createElement("input");
  input.placeholder = "czas (minuty)";
  input.type = "number";

  const channels = document.createElement("div");
  channels.className = "channels";

  for (let j = 0; j < 5; j++) {

    const id = `row${i}_ch${j}`;

    const box = document.createElement("div");
    box.className = "channel-box";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = "CH " + (j+1);

    const btn = document.createElement("button");
    btn.className = "empty";
    btn.innerText = "EMPTY";

    // 🔥 CLICK = zapis do Firebase
    btn.onclick = () => {
      let minutes = parseFloat(input.value);
      if (!minutes) return;

      const endTime = Date.now() + (minutes * 60 * 1000);

      set(ref(db, 'timers/' + id), {
        end: endTime
      });
    };

    // 🔥 NASŁUCH LIVE
    onValue(ref(db, 'timers/' + id), (snapshot) => {
      const data = snapshot.val();

      if (!data) {
        btn.innerText = "EMPTY";
        btn.className = "empty";
        return;
      }

      const interval = setInterval(() => {
        const remaining = Math.floor((data.end - Date.now()) / 1000);

        if (remaining <= 0) {
          btn.innerText = "STOI";
          btn.className = "ready";
          sound.currentTime = 0;
          sound.play();
          clearInterval(interval);
        } else {
          btn.innerText = formatTime(remaining);
          btn.className = "cooldown";
        }
      }, 1000);
    });

    box.appendChild(label);
    box.appendChild(btn);
    channels.appendChild(box);
  }

  row.appendChild(input);
  row.appendChild(channels);
  app.appendChild(row);
}
</script>

</body>
</html>
</script>

</body>
</html>
