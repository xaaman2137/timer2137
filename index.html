<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Resp Timer Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  padding: 25px;
  background: radial-gradient(circle at top, #0f1115, #050507);
  font-family: 'Inter';
  color: white;
}

#topbar {
  position: sticky;
  top: 0;
  padding: 14px;
  margin-bottom: 20px;
  border-radius: 16px;
  font-family: 'JetBrains Mono';
  font-size: 14px;
  background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  letter-spacing: 1px;
}

.row {
  background: linear-gradient(145deg, rgba(25,25,25,0.8), rgba(10,10,10,0.8));
  padding: 18px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
}

.channels {
  display: grid;
  grid-template-columns: repeat(5,1fr);
  gap: 12px;
}

button {
  border: none;
  border-radius: 18px;
  padding: 16px;
  font-family: 'JetBrains Mono';
  font-size: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: scale(1.05);
}

.empty { background:#1a1a1a;color:#555; }

.cooldown {
  background: linear-gradient(145deg,#4a0000,#8b0000);
}

.alert {
  background: linear-gradient(45deg,#ffcc00,#ff6600);
  color:#111;
  animation: pulse 1s infinite;
}

.ready {
  background: linear-gradient(145deg,#1e5a1e,#3bd43b);
  animation: glow 1.2s infinite;
}

.up {
  background: linear-gradient(145deg,#0044cc,#3399ff);
}

.wave-item {
  margin-right:6px;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

@keyframes glow {
  0% { box-shadow: 0 0 5px #3bd43b; }
  50% { box-shadow: 0 0 20px #3bd43b; }
  100% { box-shadow: 0 0 5px #3bd43b; }
}

input {
  width: 100%;
  margin-bottom: 12px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

</style>
</head>

<body>

<div id="topbar">SYSTEM READY</div>
<div id="app"></div>

<script>
const timers = {};
const finishedAt = {};

function format(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function getState(r){
  if(r<=0) return "ready";
  if(r<=180) return "alert";
  return "cooldown";
}

function updateTopBar(){
  const entries = Object.entries(timers)
    .map(([id,end])=>({id, r:Math.floor((end-Date.now())/1000)}))
    .filter(e=>e.r>0)
    .sort((a,b)=>a.r-b.r);

  const top = document.getElementById("topbar");

  if(entries.length===0){
    top.innerText="NO TARGETS LOCKED";
    return;
  }

  const active = entries.length;
  const next = entries[0];

  if(active >= 9 && next.r > 300){
    top.innerText = `PRZERWA • ${Math.floor(next.r/60)}min`;
    return;
  }

  const wave = entries.filter(e=>Math.abs(e.r - next.r) <= 10);

  if(wave.length > 1){
    top.innerHTML = "WAVE: " + wave.map(e=>{
      const ch=e.id.split("_ch")[1];
      return `<span class="wave-item ${getState(e.r)}">CH${ch} ${format(e.r)}</span>`;
    }).join("");
    return;
  }

  top.innerText = `NEXT CH${next.id.split("_ch")[1]} • ${format(next.r)}`;
}

const app=document.getElementById("app");

for(let i=0;i<3;i++){
  const row=document.createElement("div");
  row.className="row";

  const input=document.createElement("input");
  input.placeholder="czas (min)";

  const channels=document.createElement("div");
  channels.className="channels";

  for(let j=0;j<5;j++){
    const id=`row${i}_ch${j}`;

    const btn=document.createElement("button");
    btn.className="empty";
    btn.innerText="--";

    btn.onclick=()=>{
      let m=parseFloat(input.value);
      if(isNaN(m)||m<=0||m>180)return;
      timers[id]=Date.now()+m*60000;
      delete finishedAt[id];
    };

    channels.appendChild(btn);
    btn.dataset.id=id;
  }

  row.append(input,channels);
  app.appendChild(row);
}

setInterval(()=>{
  document.querySelectorAll("button").forEach(btn=>{
    const id=btn.dataset.id;
    const end=timers[id];

    if(!end){
      btn.className="empty";
      btn.innerText="--";
      return;
    }

    const now=Date.now();
    const r=Math.floor((end-now)/1000);

    if(r>0){
      btn.className=getState(r);
      btn.innerText=format(r);
      return;
    }

    if(!finishedAt[id]) finishedAt[id]=now;

    const e=Math.floor((now-finishedAt[id])/1000);

    if(e>=300){
      btn.className="up";
      btn.innerText="UP";
    } else {
      btn.className="ready";
      btn.innerText="+"+format(e);
    }
  });

  updateTopBar();
},500);
</script>

</body>
</html>
